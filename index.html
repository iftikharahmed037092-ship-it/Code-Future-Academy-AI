<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFA AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050714;
color:white;
overflow-x:hidden;
}

/* PARTICLES */
.particles{
position:fixed;
inset:0;
z-index:-1;
pointer-events:none;
}

/* HEADER */
.header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
backdrop-filter:blur(20px);
background:rgba(0,0,0,.4);
z-index:999;
}

/* BRAND */
.brand-area{
display:flex;
align-items:center;
gap:12px;
}

.coin-logo{
width:55px;
height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(145deg,#29b6ff,#8b5cf6);
animation:float 5s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-6px);}
100%{transform:translateY(0);}
}

/* MENU */
.desktop-menu{
display:flex;
gap:20px;
}

.desktop-menu a{
color:white;
text-decoration:none;
}

.desktop-menu a:hover{
color:#29b6ff;
}

/* BUTTONS */
.login-btn,.start-btn{
padding:10px 18px;
border:none;
cursor:pointer;
border-radius:10px;
}

.start-btn{
background:linear-gradient(90deg,#29b6ff,#8b5cf6);
color:white;
}

/* MOBILE */
.mobile-trigger{
display:none;
cursor:pointer;
}

@media(max-width:768px){
.desktop-menu{display:none;}
.mobile-trigger{display:block;}
}

/* MOBILE MENU */
.mobile-menu{
position:fixed;
right:-300px;
top:0;
width:260px;
height:100vh;
background:#0b1024;
padding:20px;
transition:.3s;
z-index:1000;
}

.close-menu{
cursor:pointer;
font-size:20px;
margin-bottom:20px;
}

.mobile-item{
padding:15px;
background:rgba(255,255,255,.05);
margin-top:10px;
cursor:pointer;
}

/* HERO */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
font-weight:800;
}

</style>
</head>

<body>

<!-- PARTICLES -->
<div class="particles"></div>

<!-- HEADER -->
<header class="header">

<div class="brand-area">
<div class="coin-logo">AI</div>
<div>
<h3>CFA AI</h3>
</div>
</div>

<nav class="desktop-menu">
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</nav>

<div style="display:flex;gap:10px;align-items:center;">
<button class="login-btn">Login</button>
<button class="start-btn">Start</button>

<div class="mobile-trigger">☰</div>
</div>

</header>

<!-- MOBILE MENU -->
<div class="mobile-menu">
<div class="close-menu">✖ Close</div>
<div class="mobile-item">Home</div>
<div class="mobile-item">About</div>
<div class="mobile-item">Services</div>
<div class="mobile-item">Contact</div>
</div>

<!-- HERO -->
<div class="hero">
CFA AI HEADER
</div>

<script>

/* MOBILE MENU */
const menu = document.querySelector(".mobile-menu");
const btn = document.querySelector(".mobile-trigger");
const close = document.querySelector(".close-menu");

btn.onclick = () => {
menu.style.right = "0";
};

close.onclick = () => {
menu.style.right = "-300px";
};

/* PARTICLES */
const particles = document.querySelector(".particles");

for(let i=0;i<40;i++){
let p = document.createElement("div");
p.style.position="absolute";
p.style.width="4px";
p.style.height="4px";
p.style.background="#29b6ff";
p.style.left=Math.random()*100+"%";
p.style.top=Math.random()*100+"%";
p.style.opacity=Math.random();
particles.appendChild(p);
}

</script>

</body>
</html>
