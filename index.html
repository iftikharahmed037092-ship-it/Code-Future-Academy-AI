<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CFA AI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050510;
    min-height:100vh;
    overflow-x:hidden;
    font-family:Arial,sans-serif;
}

/* ⭐ STARS BACKGROUND */
.stars{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:0;
}

.star{
    position:absolute;
    bottom:-10px;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    opacity:0.8;
    box-shadow:0 0 6px white;
    animation:floatUp linear infinite;
}

@keyframes floatUp{
    from{
        transform:translateY(0);
        opacity:0;
    }
    10%{opacity:1;}
    to{
        transform:translateY(-110vh);
        opacity:0;
    }
}

/* HEADER */
.navbar{
    position:relative;
    z-index:10;
    width:95%;
    margin:30px auto;
    padding:20px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;

    border-radius:25px;
    overflow:hidden; /* ⭐ IMPORTANT FIX (shine inside only) */

    background:rgba(20,20,60,.4);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.15);

    box-shadow:0 0 20px #0055ff,0 0 35px #cc00ff;
}

/* LOGO */
.logo{
    width:90px;
    height:90px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:22px;
    font-weight:bold;
    background:linear-gradient(135deg,#00aaff,#ff00ff);
    box-shadow:0 0 20px #00aaff,0 0 40px #ff00ff;
}

/* NAV */
nav{
    display:flex;
    gap:35px;
}

nav a{
    color:white;
    text-decoration:none;
    transition:.3s;
}

nav a:hover{
    color:#00d9ff;
    text-shadow:0 0 10px #00d9ff,0 0 20px #00d9ff;
}

/* BUTTONS */
.buttons{
    display:flex;
    gap:15px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:12px;
    color:white;
    cursor:pointer;
    transition:.3s;
}

button:first-child{
    background:#101050;
    box-shadow:0 0 15px #3355ff;
}

button:last-child{
    background:linear-gradient(to right,#0066ff,#ff00ff);
    box-shadow:0 0 15px #0066ff,0 0 20px #ff00ff;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 0 25px cyan,0 0 35px magenta;
}

/* ✨ SHINE (FIXED INSIDE ONLY) */
.navbar::before{
    content:"";
    position:absolute;
    top:-50%;
    left:-60%;
    width:50%;
    height:200%;

    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.25),
        transparent
    );

    transform:skewX(-25deg);
    animation:shine 6s infinite linear;
    pointer-events:none;
}

@keyframes shine{
    100%{
        left:160%;
    }
}
</style>

</head>

<body>

<div class="stars"></div>

<header class="navbar">

    <div class="logo">CFA AI</div>

    <nav>
        <a href="#" onclick="comingSoon()">Home</a>
        <a href="#" onclick="comingSoon()">Templates</a>
        <a href="#" onclick="comingSoon()">Features</a>
        <a href="#" onclick="comingSoon()">Pricing</a>
        <a href="#" onclick="comingSoon()">Support</a>
    </nav>

    <div class="buttons">
        <button onclick="comingSoon()">Login</button>
        <button onclick="comingSoon()">Get Started</button>
    </div>

</header>

<script>
function comingSoon(){
    alert("Coming Soon 🚀");
}

/* ⭐ STAR SYSTEM (MEDIUM SPEED FIX) */
const starsContainer = document.querySelector(".stars");

function createStar(){
    const star = document.createElement("div");
    star.classList.add("star");

    star.style.left = Math.random() * 100 + "vw";

    // ⭐ medium speed (not too fast, not too slow)
    const duration = Math.random() * 2.5 + 4.5;
    star.style.animationDuration = duration + "s";

    const size = Math.random() * 3 + 1;
    star.style.width = size + "px";
    star.style.height = size + "px";

    starsContainer.appendChild(star);

    setTimeout(() => {
        star.remove();
    }, duration * 1000);
}

setInterval(createStar, 90);
</script>

</body>
</html>
