<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFA AI Editor</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#050510;
    height:100vh;
    overflow:hidden;
}

/* TOP BAR */
.topbar{
    height:70px;
    background:#0b1020;
    border-bottom:1px solid rgba(255,255,255,.1);

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 20px;
    color:white;
}

/* MAIN AREA */
.editor-layout{
    display:flex;
    height:calc(100vh - 70px);
}

/* LEFT PANEL */
.left-panel{
    width:260px;
    background:#0b1020;
    border-right:1px solid rgba(255,255,255,.1);
    color:white;
    padding:15px;
}

/* CENTER CANVAS */
.canvas-area{
    flex:1;
    background:#111827;
    padding:20px;
    overflow:auto;
}

.canvas{
    background:white;
    min-height:1000px;
    border-radius:12px;
    padding:40px;
}

/* RIGHT PANEL */
.right-panel{
    width:320px;
    background:#0b1020;
    border-left:1px solid rgba(255,255,255,.1);
    color:white;
    padding:15px;
}
    .resizer-left,
.resizer-right{
    width:6px;
    background:#444;
    cursor:col-resize;
}

.resizer-left:hover,
.resizer-right:hover{
    background:#00c6ff;
}
</style>
</head>

<body>

<div class="topbar">
    <h2>CFA AI Editor</h2>

    <div>
        Preview
        &nbsp;&nbsp;
        Publish
    </div>
</div>

<div class="editor-layout">

    <div class="left-panel">
        Elements Panel
    </div>

    <div class="canvas-area">

        <div class="canvas">

            <h1>
                Your Website Starts Here
            </h1>

        </div>

    </div>

    <div class="right-panel">
        Settings Panel
    </div>
    <div class="left-panel">
    Elements Panel
</div>

<div class="resizer-left"></div>

<div class="canvas-area">
    ...
</div>

<div class="resizer-right"></div>

<div class="right-panel">
    Settings Panel
</div>

</div>

<script>

const leftPanel = document.querySelector(".left-panel");
const rightPanel = document.querySelector(".right-panel");

const leftResizer = document.querySelector(".resizer-left");
const rightResizer = document.querySelector(".resizer-right");

/* LEFT PANEL */
leftResizer.addEventListener("mousedown", function(){

    function move(e){
        leftPanel.style.width = e.clientX + "px";
    }

    function stop(){
        document.removeEventListener("mousemove", move);
        document.removeEventListener("mouseup", stop);
    }

    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", stop);
});

/* RIGHT PANEL */
rightResizer.addEventListener("mousedown", function(){

    function move(e){
        rightPanel.style.width =
        (window.innerWidth - e.clientX) + "px";
    }

    function stop(){
        document.removeEventListener("mousemove", move);
        document.removeEventListener("mouseup", stop);
    }

    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", stop);
});

</script>

</body>
</html>
